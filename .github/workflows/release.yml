name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.3.0)'
        required: true
        type: string

env:
  BUN_VERSION: "1.3.5"

jobs:
  # Build one binary per target platform, all cross-compiled from Ubuntu via bun
  build:
    strategy:
      matrix:
        target: [linux-x64, linux-arm64, darwin-x64, darwin-arm64, windows-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        run: |
          mkdir -p release
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="${{ matrix.target }}"

          if [[ "$TARGET" == windows-* ]]; then
            # Cross-compile Windows binary; bun appends .exe when targeting windows
            bun build apps/cli/src/index.ts \
              --compile \
              --target "bun-$TARGET" \
              --define "__ATLCLI_VERSION__=\"$VERSION\"" \
              --outfile "release/atlcli.exe"
            cd release
            zip "atlcli-$TARGET.zip" atlcli.exe
            rm atlcli.exe
            cd ..
          else
            bun build apps/cli/src/index.ts \
              --compile \
              --target "bun-$TARGET" \
              --define "__ATLCLI_VERSION__=\"$VERSION\"" \
              --outfile "release/atlcli"
            cd release
            tar -czvf "atlcli-$TARGET.tar.gz" atlcli
            rm atlcli
            cd ..
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: binary-${{ matrix.target }}
          path: release/

  # Create GitHub Release
  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/binary-*/; do
            cp "$dir"*.tar.gz release/ 2>/dev/null || cp "$dir"*.zip release/ 2>/dev/null || true
          done

          # Generate combined checksums
          cd release
          shopt -s nullglob
          for f in *.tar.gz *.zip; do sha256sum "$f" >> checksums.txt; done
          shopt -u nullglob

          if [[ ! -s checksums.txt ]]; then
            echo "ERROR: no release archives found" >&2
            exit 1
          fi
          cat checksums.txt
          ls -la

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to HEAD"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          else
            echo "No previous tag, including all commits"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD~20..HEAD 2>/dev/null || git log --pretty=format:"- %s (%h)")
          fi

          # Write to file for multiline handling
          echo "$CHANGELOG" > changelog.txt

          # Also create a formatted version
          {
            echo "## What's Changed"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "## Checksums"
            echo ""
            echo '```'
            cat release/checksums.txt
            echo '```'
            echo ""
            echo "## Installation"
            echo ""
            echo "### Homebrew (macOS/Linux)"
            echo '```bash'
            echo "brew install bjoernschotte/tap/atlcli"
            echo '```'
            echo ""
            echo "### Manual Download"
            echo "Download the appropriate binary for your platform, extract, and add to your PATH."
          } > release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: |
            release/*.tar.gz
            release/*.zip
            release/checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
